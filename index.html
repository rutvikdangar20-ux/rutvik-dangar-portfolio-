 <script>
/* ============================================
   RUTVIK PORTFOLIO — Motion & Interaction JS
   Pure Vanilla JS | No dependencies
   ============================================ */

(function() {

  // ── 1. SCROLL REVEAL ENGINE ──────────────────
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        revealObserver.unobserve(entry.target); // animate once
      }
    });
  }, {
    threshold: 0.1,
    rootMargin: '0px 0px -48px 0px'
  });

  // Observe all reveal elements
  function initReveal() {
    document.querySelectorAll(
      '.reveal, .reveal-left, .reveal-scale, .reveal-grid'
    ).forEach(el => revealObserver.observe(el));
  }


  // ── 2. NAVBAR SCROLL ─────────────────────────
  function initNavbar() {
    const nav = document.querySelector('nav, header, [class*="navbar"], [class*="nav-bar"]');
    if (!nav) return;

    const onScroll = () => {
      nav.classList.toggle('scrolled', window.scrollY > 60);
    };

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll(); // run once on load
  }


  // ── 3. BACK TO TOP (Removed to avoid redundant and unstyled elements) ───────────


  // ── 4. SMOOTH ANCHOR LINKS ───────────────────
  function initSmoothAnchors() {
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', (e) => {
        const target = document.querySelector(anchor.getAttribute('href'));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
  }


  // ── 5. ACTIVE NAV LINK (Scroll Spy) ──────────
  function initScrollSpy() {
    const sections = document.querySelectorAll('section[id]');
    const navLinks = document.querySelectorAll('nav a[href^="#"], header a[href^="#"]');
    if (!sections.length || !navLinks.length) return;

    const spy = () => {
      let current = '';
      sections.forEach(section => {
        if (window.scrollY >= section.offsetTop - 100) {
          current = section.id;
        }
      });
      navLinks.forEach(link => {
        const href = link.getAttribute('href');
        link.classList.toggle('active', href === `#${current}`);
      });
    };

    window.addEventListener('scroll', spy, { passive: true });
    spy();
  }


  // ── 6. INIT ALL ──────────────────────────────
  // Wait for DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      initReveal();
      initNavbar();
      initSmoothAnchors();
      initScrollSpy();
    });
  } else {
    initReveal();
    initNavbar();
    initSmoothAnchors();
    initScrollSpy();
  }

  // For React/Next.js — re-init after route changes if needed
  // Call window.__initPortfolioMotion() from your page component's useEffect
  window.__initPortfolioMotion = () => {
    setTimeout(initReveal, 100);
  };

})();
</script>
